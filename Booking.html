<!DOCTYPE html>
<html>
    <head>
        <title>Crackers KE | Booking </title>
        <link href="./style.css" rel="stylesheet">
        <script src="https://kit.fontawesome.com/00930a170e.js" crossorigin="anonymous"></script>
        <meta charset="UTF-8">
    </head>
<body>
    <nav class="navbar">
        <a href="./index.html">HOME</a>
        <a href="./about.html"> ABOUT</a>
        <a href="./contact.html"> CONTACT</a>
        <a class="active" href="./Booking.html"> BOOKING</a>
        <a id="lastone" href="./membership.html">PARTNERSHIP</a>
    <header>
            <h6 id="logo">THE<br>CRACKERS<br>KE</h6>
    </header>
    </nav>
    <form class="form" action="./submission.html" method="GET">
        <section class="heading"><i class="fa-regular fa-calendar-days"></i> Book Your Dance Session</section>
        <div class="client">
            <label for="client">Please Enter Your Name :</label>
            <input type="text" id="client" placeholder=" 👤 Peter Musyoka">
        </div>
        <div class="purpose">
            <p>Booking Purpose :</p>
            <section class="sectionn">
            <input type="radio" id="show" name="perform" value="Shows">
            <label for="show">Live Performances / Shows</label><br>
            <input type="radio" id="events" name="perform" value="events">
            <label for="events">Private & Corporate Events</label><br>
            <input type="radio" id="production" name="perform" value="production">
            <label for="production">Video & Content Production</label><br>
            <input type="radio" id="class" name="perform" value="class">
            <label for="class">Classes & Workshops</label><br>
            <input type="radio" id="appearance" name="perform" value="appearance">
            <label for="appearance">Special Appearances / Guest Performances</label><br>
            </section>
        </div>
        <div class="madancer">
            <label for="dancers">Number of Dancers Required</label>
            <select id="dancers" name="how_many_dancers">
                <option selected disabled>Choose here</option>
                <option value="7">All</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>
        </div>
        <div class="date">
            <label for="date">Date Of The Event :</label>
            <input type="date" name="date" id="date" required>
        </div>
        <div class="location">
            <label for="location">Location Of Proposed Event :</label>
            <input type="text" list="locations" id="location" name="area" placeholder="📍 Location" required>
            <datalist id="locations">
                <option value="Nairobi"></option>
                <option value="Mombasa"></option>
                <option value="Kisumu"></option>
                <option value="Nakuru"></option>
                <option value="Eldoret"></option>
                <option value="Machakos"></option>
                <option value="Other"></option>
            </datalist>
        </div>
        <div class="budget">
            <label for="budget">Please Indicate Your Proposed Budget :</label>
            <input type="number" id="budget" name="budget" step="1000" min="1000" placeholder="Ksh / =" required>
        </div>
        <div class="extra">
            <label for="extra">Any Other Necessary Detail :</label><br>
            <textarea id="extra" name="extra" rows="5" column="10" placeholder="Any extra details? e.g. special song request, number of dancers needed, event theme..."></textarea>
        </div>
        <div class="submit">
            <input class="book" type="submit" value="BOOK NOW">
        </div>
    </form>
</body>
</html>
